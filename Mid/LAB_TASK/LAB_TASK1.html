<html>

<head>
    <title>Student internship Form</title>
</head>

<body>
    <h1>Internship Form</h1>
    <table>
        <tr>
            <td>Student Name</td>
            <td> <input type="text" name="name" placeholder="Talha" </td>

        </tr>

        <tr>
            <td>Email Address</td>
            <td><input type="email" name="email_address" placeholder="talha.@example.com"></td>

        </tr>

        <tr>
            <td>Preferred internship</td>
            <td><input type="radio" name="email_address" value="On-site"> On-Site</td>
            <td><input type="radio" name="email_address" value="Remote"> Remote</td>


        </tr>
        <tr>
            <td>Internship Duration</td>
            <td>
                <select name="internship_duration">
                    <option value="6-weeks">6 Weeks</option>
                    <option value="3-months">3 Months</option>
                </select>
            </td>
        </tr>

        <tr>
        <tr>
            <td>Skills of Interest</td>
            <td>
                <input type="checkbox" name="skills" value="web-dev"> Web Development
                <br>
                <input type="checkbox" name="skills" value="data-analysis"> Data Analysis
                <br>
                <input type="checkbox" name="skills" value="mobile-apps"> Mobile Apps
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="Submit">
            </td>
        </tr>









    </table>

</body>

</html>
